<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Arrow function</title>
</head>
<body>
    <script>
        //arrow function with single parameter
        const getSpendAlert = (amount) => {
            return `Warning! You just spent ${amount} PKR`;
        }
        console.log(getSpendAlert(150));
        // with no parameters
        const sendAlert = () => {
            return `Warning! Health Critically Low`;
        }

        console.log(sendAlert());

        //using two parameters
        const showNotice = (year, age) => {
            return `It is now ${year} & You have turned ${age}`;
        }
        console.log(showNotice(2027, 19));

        /*
        Challenge:
        - speedWarning function : warn only when speed limit crossed
        - take two parameters : speedLimit, actualSpeed
        
        */
        
        //const speedWarning = speed => `You are going at ${speed} mph!`;
        const speedWarning = (speedLimit = 30, actualSpeed = 0) => {
            if (actualSpeed > speedLimit) {
                return `You are going at ${actualSpeed} mph!`;
            }
        }
        console.log(speedWarning(30, 40));

        // rest parameters
        const distanceTraveledMiles = [267, 345, 234, 190, 299];

        const distanceTraveledKms = distanceTraveledMiles.map(function(distance){
            return Math.round(distance * 1.6);
        })

        console.log(distanceTraveledKms);
    </script>
</body>
</html>
