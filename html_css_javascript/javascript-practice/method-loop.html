<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods & Loops</title>
</head>
<body>
    <script>
        // methods to manipulate text string.
        let username = "future_coder";
        console.log(username.toUpperCase());
        console.log(username.replace("future","pro"));

        // methods to manipulate array.
        let shopping_list = ["apples", "milk"];
        shopping_list.push("bread");
        console.log(shopping_list);

        // the for loop
        for (i=0; i<3; i++) {
            console.log(i);
        }

        // loop for array
        for(let i=0; i < shopping_list.length; i++){
            console.log(shopping_list[i]);
        }

        // the includes() method | if thing present
        console.log(shopping_list.includes("milk"));
        console.log(shopping_list.includes("eggs"));

        // the indexOf() method for locating data | where thing present and found
        let secretCode = "892-XJ-44";
        console.log(secretCode.indexOf("-"));
        console.log(shopping_list.indexOf("milk"));
        console.log(shopping_list.indexOf("eggs"));

        // trying forEach() loop
        console.log("🛒 Your Shopping List: ");
        shopping_list.forEach((item, index) => {
            console.log(`${index +1}. ${item.toUpperCase()}`);
        });

        let usernames = ["alice", "BOB", "charlie"];
        console.log("Our Users: ")
        usernames.forEach((item, index) => {
            console.log(`${index +1}. ${item.toLowerCase()}`);
        }) 
    </script>
</body>
</html>
