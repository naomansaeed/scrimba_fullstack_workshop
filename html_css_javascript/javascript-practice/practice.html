<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
    <script>
        // map() method
        let users = ["alice", "bob", "charlie"];
        let labeledUsers = users.map(user => `User: ${user}`);
        console.log(labeledUsers);

        // forEach() loop
        let fruits = ["apple", "banana", "cherry"];
        fruits.forEach(fruit => {
            console.log(fruit);
        });

        //function expression
        /*
        function doubleNumber (num) {
            return num * 2;
        } */

        const tripleNumber = function (num) {
            return num * 3 ;
        }

        console.log(tripleNumber(5));
        // for only 1 parameter & simple logic, () & {} & 'return' can be skipped
        const doubleNumber = num => num * 2;
        console.log(doubleNumber(7))

        //default value can be set for when the user forgets to provide value
        const greetUser = (name = 'Guest') => {
            return `Welcome! ${name}.`;
        }
        console.log(greetUser('Edmond'));
        console.log(greetUser());
    </script>
</body>
</html>
