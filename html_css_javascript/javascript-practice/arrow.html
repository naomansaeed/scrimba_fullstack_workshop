<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function</title>
</head>
<body>
    <script>
        //This is to understand the use of => in writing a function
        // Apperantly it is the modern approach

        //Classic way to write a function
        function greet(name) {
            return "Hello, " + name + "!";
        }
        console.log(greet("Sara"));

        // Function expression | different syntax
        const greet_one = function(name) {
            return "Hello, " + name + "!";
        }
        console.log(greet_one("Martha"));

        // arrow function consise + modern
        const greet_two = (name) => {
            return "Hello, " + name + "!";
        }
        console.log(greet_two("Daisy"));

        // super concise | when possible
        const greet_three = name => "Hello, " + name + "!";
        console.log(greet_three("Cordilia"));

        // using arraow function in forEach loop makes it more readable almost like english
        let members = ["Anne", "Janet", "Georgie", "Victoria"];
        members.forEach(member => {
            console.log (`New member ${member} has joined. Welcome to her!`);
        });

        //rest parameters: written as ...parameter & used to recieve undetermined number of input
        const sumScores = (...allScores) => {
        /*    let total = 0;
            for(let i=0; i< allScores.length; i++) {
                total += allScores[i];
            }
            return total; */

            //add up all vales using reduce() method
            return allScores.reduce((total,current) => total + current, 0);
        }
        /*(...allScores) => {
            allScores.reduce(total, current) 
        } */

        console.log(sumScores(72, 53, 81));
    </script>
</body>
</html>
