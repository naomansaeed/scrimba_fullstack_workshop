<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Uer Permissions</title>
</head>
<body>
    <script>
        // This is a demonstration for rest parameter use
        function setPermissionLevel (permissionLevel, ...names) {
            names.forEach((name) => 
            console.log(`${name} now has 
            ${permissionLevel} level access.`
            
            ));
        }

        setPermissionLevel('admin', 'Edmund', 'Rosa', 'Esther', 'Clare');
    </script>
</body>
</html>
